  <audio id="bgMusic" src="20200229-2.mp3" loop></audio>

<script>
  function toggleMenu() {
    const menu = document.getElementById('dropdownMenu');
    menu.classList.toggle('show');
  }

  const music = document.getElementById("bgMusic");

  // Default to ON if not set
  if (localStorage.getItem("musicPlaying") === null) {
    localStorage.setItem("musicPlaying", "true");
  }

  // Restore playback time
  music.currentTime = localStorage.getItem("musicTime") || 0;

  function startMusicIfAllowed() {
    if (localStorage.getItem("musicPlaying") === "true") {
      music.play().catch(() => {});
    }
  }

  // Try to autoplay
  startMusicIfAllowed();

  // Save position
  window.addEventListener("beforeunload", () => {
    localStorage.setItem("musicTime", music.currentTime);
  });

  // First user interaction enables sound on mobile
  document.addEventListener("click", function enableAudio() {
    startMusicIfAllowed();
    document.removeEventListener("click", enableAudio);
  });
</script>
</body>
