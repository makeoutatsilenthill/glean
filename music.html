<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>music - glean</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Burger menu -->
  <div class="burger-menu" onclick="toggleMenu()">☰</div>
  <div class="dropdown-menu" id="dropdownMenu">
    <a href="index.html">home</a>
    <a href="meditations.html">meditations</a>
    <a href="endeavors.html">endeavors</a>
    <a href="science.html">science</a>
    <a href="music.html">music</a>
  </div>

  <!-- Centered toggle button -->
  <div class="page-title" id="musicButton">:(</div>

  <!-- Audio -->
  <audio id="bgMusic" src="20200229-2.mp3" loop></audio>

  <script>
    // ----- Burger menu -----
    function toggleMenu() {
      const menu = document.getElementById('dropdownMenu');
      menu.classList.toggle('show');
    }

    // ----- Music player -----
    const music = document.getElementById("bgMusic");
    const button = document.getElementById("musicButton");

    // Default state = playing
    if (localStorage.getItem("musicPlaying") === null) {
      localStorage.setItem("musicPlaying", "true");
    }

    // Restore time
    music.currentTime = localStorage.getItem("musicTime") || 0;

    // Update button emoji
    function updateButton() {
      if (localStorage.getItem("musicPlaying") === "true") {
        button.textContent = ":)";
      } else {
        button.textContent = ":(";
      }
    }

    // Toggle music
    function toggleMusic() {
      if (music.paused) {
        music.play().catch(() => {}); // autoplay might fail on first visit
        localStorage.setItem("musicPlaying", "true");
      } else {
        music.pause();
        localStorage.setItem("musicPlaying", "false");
      }
      updateButton();
    }

    button.addEventListener("click", toggleMusic);

    // Try to play if supposed to
    if (localStorage.getItem("musicPlaying") === "true") {
      music.play().catch(() => {}); // may fail due to browser restrictions
    }

    updateButton();

    // Save playback time when leaving page
    window.addEventListener("beforeunload", () => {
      localStorage.setItem("musicTime", music.currentTime);
    });

    // Enable playback on first interaction (needed for Safari/iOS)
    document.addEventListener("click", function enableAudio() {
      if (localStorage.getItem("musicPlaying") === "true") {
        music.play().catch(() => {});
      }
      document.removeEventListener("click", enableAudio);
    });
  </script>

</body>
</html>
