<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>music - glean</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Burger menu -->
  <div class="burger-menu" onclick="toggleMenu()">☰</div>
  <div class="dropdown-menu" id="dropdownMenu">
    <a href="index.html">home</a>
    <a href="meditations.html">meditations</a>
    <a href="endeavors.html">endeavors</a>
    <a href="science.html">science</a>
    <a href="music.html">music</a>
  </div>

  <!-- Centered toggle button -->
  <div class="page-title" id="musicButton">:(</div>

  <!-- Audio element -->
  <audio id="bgMusic" src="20200229-2.mp3" loop></audio>

  <script>
    // --- Burger menu ---
    function toggleMenu() {
      const menu = document.getElementById('dropdownMenu');
      menu.classList.toggle('show');
    }

    // --- Music ---
    const music = document.getElementById("bgMusic");
    const button = document.getElementById("musicButton");

    // Default: playing
    if (localStorage.getItem("musicPlaying") === null) {
      localStorage.setItem("musicPlaying", "true");
    }

    // Restore playback time
    music.currentTime = localStorage.getItem("musicTime") || 0;

    function updateButton() {
      if (localStorage.getItem("musicPlaying") === "true") {
        button.textContent = ":)";
      } else {
        button.textContent = ":(";
      }
    }

    function playMusicIfAllowed() {
      music.play().catch(() => {});
    }

    function toggleMusic() {
      if (music.paused) {
        playMusicIfAllowed();
        localStorage.setItem("musicPlaying", "true");
      } else {
        music.pause();
        localStorage.setItem("musicPlaying", "false");
      }
      updateButton();
    }

    button.addEventListener("click", toggleMusic);

    // On first click anywhere, try playing music (for Safari/iOS)
    document.addEventListener("click", function enableAudioOnce() {
      if (localStorage.getItem("musicPlaying") === "true" && music.paused) {
        playMusicIfAllowed();
      }
      document.removeEventListener("click", enableAudioOnce);
      updateButton();
    });

    // Attempt autoplay for desktop where allowed
    if (localStorage.getItem("musicPlaying") === "true") {
      playMusicIfAllowed();
    }

    // Update button initially
    updateButton();

    // Save time when leaving page
    window.addEventListener("beforeunload", () => {
      localStorage.setItem("musicTime", music.currentTime);
    });
  </script>

</body>
</html>
