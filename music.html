<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>music - glean</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="burger-menu" onclick="toggleMenu()">☰</div>
  <div class="dropdown-menu" id="dropdownMenu">
    <a href="index.html">home</a>
    <a href="meditations.html">meditations</a>
    <a href="endeavors.html">endeavors</a>
    <a href="science.html">science</a>
    <a href="music.html">music</a>
  </div>

  <div class="page-title" id="musicButton" onclick="toggleMusic()">☹</div>

  <audio id="bgMusic" src="music.mp3" loop></audio>

  <script>
    function toggleMenu() {
      const menu = document.getElementById('dropdownMenu');
      menu.classList.toggle('show');
    }

    const music = document.getElementById("bgMusic");
    const button = document.getElementById("musicButton");

    // Restore time
    music.currentTime = localStorage.getItem("musicTime") || 0;

    // Resume if playing
    if (localStorage.getItem("musicPlaying") === "true") {
      music.play();
      button.textContent = "😊";
    }

    function toggleMusic() {
      if (music.paused) {
        music.play();
        localStorage.setItem("musicPlaying", "true");
        button.textContent = "😊";
      } else {
        music.pause();
        localStorage.setItem("musicPlaying", "false");
        button.textContent = "☹";
      }
    }

    window.addEventListener("beforeunload", () => {
      localStorage.setItem("musicTime", music.currentTime);
    });
  </script>

</body>
</html>
