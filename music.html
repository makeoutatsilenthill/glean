<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>music - glean</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Burger menu -->
  <div class="burger-menu" onclick="toggleMenu()">☰</div>
  <div class="dropdown-menu" id="dropdownMenu">
    <a href="index.html">home</a>
    <a href="meditations.html">meditations</a>
    <a href="endeavors.html">endeavors</a>
    <a href="science.html">science</a>
    <a href="music.html">music</a>
  </div>

  <!-- Centered toggle button -->
  <div class="page-title" id="musicButton">:(</div>

  <!-- Audio -->
  <audio id="bgMusic" src="20200229-2.mp3" loop></audio>

  <script>
const music = document.getElementById("bgMusic");
const button = document.getElementById("musicButton");

// Default to playing
if (localStorage.getItem("musicPlaying") === null) {
  localStorage.setItem("musicPlaying", "true");
}

// Restore playback time
music.currentTime = localStorage.getItem("musicTime") || 0;

function updateButton() {
  if (localStorage.getItem("musicPlaying") === "true") {
    button.textContent = ":)";
  } else {
    button.textContent = ":(";
  }
}

function toggleMusic() {
  if (music.paused) {
    music.play().catch(() => {});
    localStorage.setItem("musicPlaying", "true");
  } else {
    music.pause();
    localStorage.setItem("musicPlaying", "false");
  }
  updateButton();
}

button.addEventListener("click", toggleMusic);

// This ensures first click anywhere starts the audio
document.addEventListener("click", function startOnce() {
  if (localStorage.getItem("musicPlaying") === "true" && music.paused) {
    music.play().catch(() => {});
  }
  document.removeEventListener("click", startOnce);
});

// Save position on unload
window.addEventListener("beforeunload", () => {
  localStorage.setItem("musicTime", music.currentTime);
});

// Set button state
updateButton();
</script>

</body>
</html>
