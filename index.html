<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>glean</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Burger menu -->
  <div class="burger-menu" onclick="toggleMenu()">☰</div>
  <div class="dropdown-menu" id="dropdownMenu">
    <a href="#" data-page="home">home</a>
    <a href="#" data-page="meditations">meditations</a>
    <a href="#" data-page="endeavors">endeavors</a>
    <a href="#" data-page="science">science</a>
    <a href="#" data-page="music">music</a>
  </div>

  <!-- Music -->
  <audio id="bgMusic" src="20200229-2.mp3" loop></audio>

  <!-- Main content -->
  <div id="content" class="center-text">glean</div>

  <script>
    // ---- Burger menu ----
    function toggleMenu() {
      document.getElementById('dropdownMenu').classList.toggle('show');
    }

    // ---- Music ----
    const music = document.getElementById("bgMusic");
    
    // Try to start immediately
music.play().catch(() => {});
// iOS requires first interaction to unlock audio
document.addEventListener("click", function unlockAudio() {
  if (music.paused) {
    music.play().catch(() => {});
  }
  document.removeEventListener("click", unlockAudio);
});

// Toggle for music page
function toggleMusic() {
  const btn = document.getElementById("musicButton");
  if (!btn) return;

  if (music.paused) {
    music.play();
    btn.textContent = ":)";
  } else {
    music.pause();
    btn.textContent = ":(";
  }
}
    // ---- Pages ----
const pages = {
  home: `<div class="center-text">glean</div>`,
  meditations: `<div class="page-title">meditations</div>`,
  endeavors: `<div class="page-title">endeavors</div>`,
  science: `<div class="page-title">science</div>`,
  music: `<div class="page-title" id="musicButton">:)</div>`
};

function loadPage(page) {
  const contentDiv = document.getElementById("content");
  contentDiv.innerHTML = pages[page];

  // If we loaded music page, attach the button listener
  if (page === "music") {
    const btn = document.getElementById("musicButton");
    btn.addEventListener("click", toggleMusic);

    // Set correct emoji when page loads
    btn.textContent = music.paused ? ":(" : ":)";
  }

  // Close menu after click
  document.getElementById('dropdownMenu').classList.remove('show');
}

// Menu link clicks
document.querySelectorAll(".dropdown-menu a").forEach(link => {
  link.addEventListener("click", (e) => {
    e.preventDefault();
    const page = link.getAttribute("data-page");
    loadPage(page);
  });
});

// Load initial page
loadPage("home");
  </script>
</body>
</html>
