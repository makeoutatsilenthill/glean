<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>glean</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Burger menu -->
  <div class="burger-menu" onclick="toggleMenu()">☰</div>
  <div class="dropdown-menu" id="dropdownMenu">
    <a href="#" data-page="home">home</a>
    <a href="#" data-page="meditations">meditations</a>
    <a href="#" data-page="endeavors">endeavors</a>
    <a href="#" data-page="science">science</a>
    <a href="#" data-page="music">music</a>
  </div>

  <!-- Music -->
  <audio id="bgMusic" src="20200229-2.mp3" loop></audio>

  <!-- Main content -->
  <div id="content" class="center-text">glean</div>

  <script>
    // ---- Burger menu ----
    function toggleMenu() {
      document.getElementById('dropdownMenu').classList.toggle('show');
    }

    // ---- Music ----
    const music = document.getElementById("bgMusic");
    const musicStateKey = "musicPlaying";

    if (localStorage.getItem(musicStateKey) === null) {
      localStorage.setItem(musicStateKey, "true");
    }

    function playMusicIfAllowed() {
      music.play().catch(() => {});
    }

    // Toggle music button
    let musicButton;
    function createMusicButton() {
      musicButton = document.createElement("div");
      musicButton.id = "musicButton";
      musicButton.className = "page-title";
      musicButton.style.cursor = "pointer";
      musicButton.style.textAlign = "center";
      musicButton.style.marginTop = "50px";
      updateMusicButton();
      musicButton.addEventListener("click", toggleMusic);
    }

    function toggleMusic() {
      if (music.paused) {
        playMusicIfAllowed();
        localStorage.setItem(musicStateKey, "true");
      } else {
        music.pause();
        localStorage.setItem(musicStateKey, "false");
      }
      updateMusicButton();
    }

    function updateMusicButton() {
      if (!musicButton) return;
      musicButton.textContent = (localStorage.getItem(musicStateKey) === "true") ? ":)" : ":(";
    }

    // ---- Pages ----
    const pages = {
      home: `<div class="center-text">glean</div>`,
      meditations: `<div class="page-title">meditations</div>`,
      endeavors: `<div class="page-title">endeavors</div>`,
      science: `<div class="page-title">science</div>`,
      music: `<div class="page-title" id="musicButton">:(</div>`
    };

    function loadPage(page) {
      const contentDiv = document.getElementById("content");
      contentDiv.innerHTML = pages[page];

      // If we loaded music page, attach the button listener
      if (page === "music") {
        musicButton = document.getElementById("musicButton");
        musicButton.addEventListener("click", toggleMusic);
        updateMusicButton();
      }

      // Close menu after click
      document.getElementById('dropdownMenu').classList.remove('show');
    }

    // Menu link clicks
    document.querySelectorAll(".dropdown-menu a").forEach(link => {
      link.addEventListener("click", (e) => {
        e.preventDefault();
        const page = link.getAttribute("data-page");
        loadPage(page);
      });
    });

    // Autoplay on first click (Safari/iOS)
    document.addEventListener("click", function enableAudioOnce() {
      if (localStorage.getItem(musicStateKey) === "true" && music.paused) {
        playMusicIfAllowed();
      }
      document.removeEventListener("click", enableAudioOnce);
    });

    // Initial page
    loadPage("home");
    if (localStorage.getItem(musicStateKey) === "true") {
      playMusicIfAllowed();
    }
  </script>
</body>
</html>
